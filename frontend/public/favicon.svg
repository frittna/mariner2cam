<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Mariner probe">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#sky)"/>
  <!-- High-gain dish -->
  <path fill="#64748b" d="M16 4c-3.3 0-6 1.8-6 4h12c0-2.2-2.7-4-6-4z"/>
  <rect x="15" y="7" width="2" height="4" fill="#475569"/>
  <!-- Solar wings -->
  <rect x="3" y="13" width="7" height="9" rx="1" fill="#1e3a5f" stroke="#334155" stroke-width="0.5"/>
  <rect x="22" y="13" width="7" height="9" rx="1" fill="#1e3a5f" stroke="#334155" stroke-width="0.5"/>
  <line x1="5" y1="15" x2="8" y2="15" stroke="#334155" stroke-width="0.4"/>
  <line x1="5" y1="17.5" x2="8" y2="17.5" stroke="#334155" stroke-width="0.4"/>
  <line x1="5" y1="20" x2="8" y2="20" stroke="#334155" stroke-width="0.4"/>
  <line x1="24" y1="15" x2="27" y2="15" stroke="#334155" stroke-width="0.4"/>
  <line x1="24" y1="17.5" x2="27" y2="17.5" stroke="#334155" stroke-width="0.4"/>
  <line x1="24" y1="20" x2="27" y2="20" stroke="#334155" stroke-width="0.4"/>
  <!-- Main bus -->
  <rect x="12" y="11" width="8" height="13" rx="1.5" fill="url(#gold)" stroke="#8b6914" stroke-width="0.4"/>
  <circle cx="16" cy="16" r="1.2" fill="#1e293b"/>
  <rect x="14.5" y="21" width="3" height="2" rx="0.3" fill="#334155"/>
  <!-- Star glints -->
  <circle cx="26" cy="6" r="0.8" fill="#e2e8f8" opacity="0.9"/>
  <circle cx="7" cy="9" r="0.5" fill="#e2e8f8" opacity="0.7"/>
  <circle cx="5" cy="24" r="0.4" fill="#e2e8f8" opacity="0.6"/>
</svg>
